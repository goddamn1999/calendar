<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国日历 - Chinese Calendar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📅 中国日历</h1>
            <p class="subtitle">节假日 · 农历 · 24节气</p>
        </header>
        <div class="calendar-wrapper">
            <div class="calendar-header">
                <button id="prevMonth" class="nav-btn">◀</button>
                <div class="current-date">
                    <span id="yearMonth"></span>
                    <span id="lunarYear" class="lunar-year"></span>
                </div>
                <button id="nextMonth" class="nav-btn">▶</button>
            </div>
            <div class="today-btn-wrapper">
                <button id="todayBtn" class="today-btn">回到今天</button>
            </div>
            <div class="weekdays">
                <div class="weekday">日</div>
                <div class="weekday">一</div>
                <div class="weekday">二</div>
                <div class="weekday">三</div>
                <div class="weekday">四</div>
                <div class="weekday">五</div>
                <div class="weekday">六</div>
            </div>
            <div id="calendar" class="calendar"></div>
        </div>
        <div class="legend">
            <div class="legend-item"><span class="dot holiday"></span><span>节假日</span></div>
            <div class="legend-item"><span class="dot workday"></span><span>调休上班</span></div>
            <div class="legend-item"><span class="dot weekend"></span><span>周末</span></div>
            <div class="legend-item"><span class="dot today"></span><span>今天</span></div>
        </div>
        <footer>
            <p>Powered by <a href="https://github.com/vsme/chinese-days" target="_blank">chinese-days</a></p>
        </footer>
    </div>
    <div id="dayModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chinese-days@1.5.7/dist/chinese-days.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
